services:
  coach-db:
    image: postgres:16-alpine
    container_name: uniqa-conversion-coach-db
    environment:
      POSTGRES_DB: conversion_coach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d conversion_coach"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - coach-db-data:/var/lib/postgresql/data

volumes:
  coach-db-data:
