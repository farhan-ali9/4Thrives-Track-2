name: uniqa-conversion-coach
region: fra

services:
  - name: coach-web
    github:
      branch: main
      deploy_on_push: true
      repo: dklingbeil/4Thrives-Track-2
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /healthz
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: HOST
        scope: RUN_TIME
        value: 0.0.0.0
      - key: PORT
        scope: RUN_TIME
        value: "8080"
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${coach-db.DATABASE_PRIVATE_URL}
      - key: SESSION_SECRET
        scope: RUN_TIME
        type: SECRET
        value: replace-me
      - key: BOOTSTRAP_ADMIN_EMAIL
        scope: RUN_TIME
        type: SECRET
        value: admin@example.com
      - key: BOOTSTRAP_ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
        value: replace-me
      - key: BOOTSTRAP_ADMIN_NAME
        scope: RUN_TIME
        value: Conversion Coach Admin

databases:
  - cluster_name: conversion-coach-db
    db_name: conversion_coach
    db_user: coach_admin
    engine: PG
    name: coach-db
    production: true
    version: "16"
